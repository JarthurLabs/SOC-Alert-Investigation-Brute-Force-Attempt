<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" fill="#0b1220"/>
  <rect x="52" y="42" width="816" height="430" rx="18" fill="#f8fafc" stroke="#38bdf8" stroke-width="2"/>
  <rect x="52" y="42" width="816" height="70" rx="18" fill="#0f172a"/>
  <text x="84" y="86" font-family="Arial" font-size="24" font-weight="bold" fill="#e0f2fe">SOC alert ticket — brute force pattern</text>
  <text x="690" y="86" font-family="Arial" font-size="16" fill="#facc15">Severity: High</text>

  <text x="84" y="150" font-family="Arial" font-size="13" fill="#64748b">Alert</text>
  <text x="230" y="150" font-family="Arial" font-size="16" fill="#0f172a">Repeated failed logins followed by successful login</text>
  <line x1="84" y1="164" x2="820" y2="164" stroke="#cbd5e1"/>

  <text x="84" y="198" font-family="Arial" font-size="13" fill="#64748b">Source IP</text>
  <text x="230" y="198" font-family="Arial" font-size="16" fill="#0f172a">External source observed repeatedly in auth logs</text>
  <line x1="84" y1="212" x2="820" y2="212" stroke="#cbd5e1"/>

  <text x="84" y="246" font-family="Arial" font-size="13" fill="#64748b">Affected user</text>
  <text x="230" y="246" font-family="Arial" font-size="16" fill="#0f172a">Single targeted user account in synthetic dataset</text>
  <line x1="84" y1="260" x2="820" y2="260" stroke="#cbd5e1"/>

  <text x="84" y="294" font-family="Arial" font-size="13" fill="#64748b">Evidence</text>
  <text x="230" y="294" font-family="Arial" font-size="16" fill="#0f172a">Multiple failures, same source, then successful login and privileged activity</text>
  <line x1="84" y1="308" x2="820" y2="308" stroke="#cbd5e1"/>

  <text x="84" y="342" font-family="Arial" font-size="13" fill="#64748b">Reason fired</text>
  <text x="230" y="342" font-family="Arial" font-size="16" fill="#0f172a">Failure volume alone was noisy; success-after-failure made it worth escalation</text>
  <line x1="84" y1="356" x2="820" y2="356" stroke="#cbd5e1"/>

  <text x="84" y="390" font-family="Arial" font-size="13" fill="#64748b">Recommended action</text>
  <text x="230" y="390" font-family="Arial" font-size="16" fill="#0f172a">Reset password, revoke sessions, confirm MFA, validate with the user</text>
  <line x1="84" y1="404" x2="820" y2="404" stroke="#cbd5e1"/>

  <text x="84" y="438" font-family="Arial" font-size="13" fill="#64748b">MITRE</text>
  <text x="230" y="438" font-family="Arial" font-size="16" fill="#0f172a">T1110 Brute Force, T1078 Valid Accounts</text>
</svg>